<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Obsidian Dark Charcoal -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Neon Amber/Gold Gradient for the main icon -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>

    <!-- Glossy Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Base Card background with a thin premium gold border -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="8" />

  <!-- Semi-circular glossy sheen overlay -->
  <path d="M 16 124 C 16 64.35, 64.35 16, 124 16 L 388 16 C 447.65 16, 496 64.35, 496 124 L 496 256 C 300 256, 16 350, 16 124 Z" fill="url(#accentGrad)" />

  <!-- Combined Symbol: Play Triangle + Lightning Bolt -->
  <!-- A bold, dynamic polygon representing the Zipytiny brand mark -->
  <g transform="translate(116, 106)">
    <!-- Play shape combined with lightning bolt steps -->
    <path d="M 40 40 
             L 240 150 
             L 160 170 
             L 220 260 
             L 60 140 
             L 120 120 
             Z" 
          fill="url(#goldGrad)" />
          
    <!-- Minimalist summary document lines under/behind the mark to signify Knowledge Engine -->
    <rect x="50" y="210" width="180" height="12" rx="6" fill="#f8fafc" opacity="0.85" />
    <rect x="80" y="240" width="150" height="12" rx="6" fill="#f8fafc" opacity="0.85" />
    <rect x="110" y="270" width="120" height="12" rx="6" fill="#fbbf24" opacity="0.95" />
  </g>
</svg>
