name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - master

env:
  PROJECT_ID: gen-lang-client-0003754495 # Set this to your Google Cloud Project ID
  SERVICE_NAME: snapsum                # Cloud Run service name
  REGION: europe-west2                 # Google Cloud Region
  AR_REPOSITORY: snapsum-repo          # Artifact Registry repository name

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Create Artifact Registry Repository if it doesn't exist
      - name: Create Artifact Registry Repository
        run: |
          gcloud artifacts repositories describe ${{ env.AR_REPOSITORY }} --location=${{ env.REGION }} || \
          gcloud artifacts repositories create ${{ env.AR_REPOSITORY }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Docker repository for Snapsum"

      # Configure Docker to use gcloud as a credential helper
      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Build the Docker image
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.SERVICE_NAME }}:latest \
            .

      # Push the Docker image to Google Artifact Registry
      - name: Push Docker Image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.SERVICE_NAME }}:latest

      # Deploy the container to Google Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          # Set runtime variables (like GEMINI_API_KEY) by referencing GitHub secrets
          env_vars: |
            NODE_ENV=production
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          # Allows public (unauthenticated) traffic to access the app
          flags: --allow-unauthenticated

      # Set up Node.js for building static distribution assets
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Deploy Firebase Hosting with full build output to ensure CDN static files are updated
      - name: Deploy Firebase Hosting
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          npm ci
          npm run build
          npx firebase-tools deploy --only hosting --project ${{ env.PROJECT_ID }} --non-interactive || {
            echo "::warning::Firebase Hosting deployment failed. This is expected if the service account does not have the 'Firebase Hosting Admin' role, or if Firebase Hosting is not initialized on project ${{ env.PROJECT_ID }}."
            exit 0
          }
