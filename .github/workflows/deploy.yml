name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main  # Trigger deployment whenever you push code to the main branch

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # Your GCP Project ID
  SERVICE_NAME: snapsum                     # Name you want for your Cloud Run service
  REGION: us-central1                       # GCP Region to deploy inside

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code from Github
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Authenticate to Google Cloud using your secret key
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Step 3: Set up Cloud SDK tools
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Step 4: Configure Docker to use Google container registry
      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      # Step 5: Build and push the Docker image to GCP
      - name: Build and Push Docker Image
        run: |
          docker build -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      # Step 6: Deploy the uploaded container to Google Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
